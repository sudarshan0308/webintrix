<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webnitrix OS - Master Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #0f0; user-select: none; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* Layout Containers */
        .top-bar { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        
        .stats { text-shadow: 0 0 10px #0f0; }
        #right-panel { text-align: right; border-right: 3px solid #0f0; padding-right: 15px; text-shadow: 0 0 8px #0f0; }
        #right-panel h2 { margin: 5px 0; font-size: 1.1rem; white-space: nowrap; }

        /* Tactical HUD */
        .stat-bar-container { width: 180px; height: 8px; background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; margin: 5px 0 10px auto; overflow: hidden; }
        .stat-fill { height: 100%; background: #0f0; width: 0%; transition: width 0.4s ease-out; }
        .label { font-size: 0.7rem; letter-spacing: 1px; font-weight: bold; }

        /* Bottom UI */
        #alien-label { position: absolute; bottom: 150px; left: 0; width: 100%; text-align: center; font-size: 3rem; font-weight: bold; opacity: 0; transition: opacity 0.5s; }
        #instruction-group { position: absolute; bottom: 8%; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; animation: breathe 2s infinite; }
        #timer-label { position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center; font-size: 1.2rem; opacity: 0; }
        
        /* --- MOBILE REPAIR: THE STACK --- */
        @media (max-width: 600px) {
            .top-bar { flex-direction: column; align-items: flex-start; gap: 10px; top: 10px; }
            #right-panel { text-align: left; border-right: none; border-left: 2px solid #0f0; padding-right: 0; padding-left: 10px; }
            #right-panel h2 { font-size: 0.8rem; }
            .stat-bar-container { margin: 5px auto 10px 0; width: 120px; }
            #alien-label { font-size: 2rem; bottom: 180px; }
            #instruction-group { bottom: 25%; }
        }

        @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="top-bar">
            <div class="stats">
                <h2 id="status-display">SYSTEM: STANDBY</h2>
                <p id="mode-display">MODE: IDLE</p>
            </div>
            <div id="right-panel">
                <div id="architect-view">
                    <p>PROJECT: WEBNITRIX</p>
                    <h2>ARCHITECT: SUDARSHANA MURTHY</h2>
                    <p>OS VER: 3.0.4.GOLDEN</p>
                </div>
                <div id="tactical-view" style="display: none;">
                    <p style="border-bottom: 1px solid #0f0; font-size: 0.7rem;">TACTICAL DATA</p>
                    <div class="label">POWER</div>
                    <div class="stat-bar-container"><div id="bar-power" class="stat-fill"></div></div>
                    <div class="label">SPEED</div>
                    <div class="stat-bar-container"><div id="bar-speed" class="stat-fill"></div></div>
                </div>
            </div>
        </div>
        
        <div id="instruction-group">
            <div style="font-weight:bold; letter-spacing:3px;">TAP CORE TO START</div>
            <div style="font-size:0.7rem; opacity:0.7;">SWIPE UP/DOWN TO CYCLE</div>
        </div>

        <div id="alien-label">HEATBLAST</div>
        <div id="timer-label">DNA STABILITY: 100%</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let active = false, transformed = false, index = 0, scrollLock = false;
    let hologram, dial, touchStartY = 0;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const pL = new THREE.PointLight(0xffffff, 50); pL.position.set(2, 5, 2); scene.add(pL);

    // 10 ALIENS - ENSURE THESE FILES EXIST IN YOUR /static/models/ FOLDER
    const alienStats = [
        { n: "HEATBLAST", p: 85, s: 60, t: './static/models/alien1.png' },
        { n: "DIAMONDHEAD", p: 95, s: 40, t: './static/models/alien2.png' },
        { n: "FOUR ARMS", p: 100, s: 30, t: './static/models/alien3.png' },
        { n: "STINKFLY", p: 60, s: 85, t: './static/models/alien4.png' },
        { n: "GREY MATTER", p: 15, s: 70, t: './static/models/alien5.png' },
        { n: "XLR8", p: 55, s: 100, t: './static/models/alien6.png' },
        { n: "WILDMUTT", p: 75, s: 85, t: './static/models/alien7.png' },
        { n: "UPGRADE", p: 70, s: 65, t: './static/models/alien8.png' },
        { n: "VERTEBRATE", p: 65, s: 90, t: './static/models/alien9.png' },
        { n: "GHOSTFREAK", p: 65, s: 90, t: './static/models/alien10.png' }
    ];

    const texLoader = new THREE.TextureLoader();
    
    // Initial Load
    hologram = new THREE.Sprite(new THREE.SpriteMaterial({ 
        map: texLoader.load(alienStats[0].t), 
        color: 0x00ff00, 
        transparent: true, 
        opacity: 0 
    }));
    hologram.scale.set(1.6, 1.6, 1); 
    hologram.position.y = 1.8; 
    scene.add(hologram);

    new GLTFLoader().load('./static/models/omnitrix.glb', (g) => {
        scene.add(g.scene);
        g.scene.traverse(n => { if(n.name.toLowerCase().includes("dial")) dial = n; });
        camera.position.set(0, 2, 5); camera.lookAt(0,0,0);
    });

    function changeAlien(dir) {
        if (scrollLock) return;
        scrollLock = true;
        
        if (dir === 'next') index = (index + 1) % alienStats.length;
        else index = (index - 1 + alienStats.length) % alienStats.length;

        // DEBUG LOG: Open your browser console (F12) to see this!
        console.log(`Switched to: ${alienStats[index].n} (Index: ${index}) Path: ${alienStats[index].t}`);

        const newTexture = texLoader.load(alienStats[index].t, 
            undefined, 
            undefined, 
            (err) => console.error(`FAILED TO LOAD: ${alienStats[index].t}. Check if file exists!`)
        );

        hologram.material.map = newTexture;
        document.getElementById('alien-label').innerText = alienStats[index].n;
        
        // Update Bars safely
        const pBar = document.getElementById('bar-power');
        const sBar = document.getElementById('bar-speed');
        if(pBar) pBar.style.width = alienStats[index].p + "%";
        if(sBar) sBar.style.width = alienStats[index].s + "%";

        if(dial) dial.rotation.y += (dir === 'next' ? 0.6 : -0.6);

        setTimeout(() => { scrollLock = false; }, 400); // Increased lock to 400ms for stability
    }

    // INPUTS
    window.addEventListener('wheel', (e) => { 
        if (active && !transformed) {
            e.preventDefault(); // Stop page from moving
            changeAlien(e.deltaY > 0 ? 'next' : 'prev'); 
        }
    }, { passive: false });

    // Click/Touch Activation
    const handleAction = () => {
        if (transformed) return;
        if (!active) {
            active = true;
            document.getElementById('status-display').innerText = "SYSTEM: ACTIVE";
            document.getElementById('architect-view').style.display = 'none';
            document.getElementById('tactical-view').style.display = 'block';
            document.getElementById('alien-label').style.opacity = 1;
            document.getElementById('instruction-group').style.display = "none";
            hologram.material.opacity = 0.8;
        } else {
            transformed = true;
            document.getElementById('timer-label').style.opacity = 1;
        }
    };

    window.addEventListener('mousedown', (e) => { if(e.button === 0) handleAction(); });
    window.addEventListener('touchstart', (e) => { 
        touchStartY = e.touches[0].clientY; 
        if(!active) handleAction(); 
    }, { passive: true });

    window.addEventListener('touchend', (e) => {
        let diff = touchStartY - e.changedTouches[0].clientY;
        if (active && !transformed && Math.abs(diff) > 40) {
            changeAlien(diff > 0 ? 'next' : 'prev');
        }
    }, { passive: true });

    function animate() {
        requestAnimationFrame(animate);
        if(active && !transformed) hologram.position.y = 1.8 + Math.sin(Date.now()*0.003)*0.05;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
