<!DOCTYPE html>
<html>
<head>
    <title>Webintrix OS - Master Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; color: #0f0; }
        
        /* Left Side Stats */
        .stats { position: absolute; top: 20px; left: 20px; text-shadow: 0 0 10px #0f0; }
        
        /* Right Side Creator Info - Fixed and Styled */
        #creator-info { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            text-align: right; 
            border-right: 3px solid #0f0; 
            padding-right: 15px; 
            text-shadow: 0 0 8px #0f0;
            line-height: 1.2;
        }
        #creator-info h2 { margin: 5px 0; font-size: 1.2rem; }
        #creator-info p { margin: 2px 0; font-size: 0.8rem; letter-spacing: 1px; }

        #alien-label { position: absolute; bottom: 80px; width: 100%; text-align: center; font-size: 3rem; font-weight: bold; opacity: 0; transition: opacity 0.5s; }
        #timer-label { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 1.2rem; opacity: 0; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; z-index: 100; pointer-events: none; }
        
        /* Lowered Prompt */
        #prompt { position: absolute; bottom: 10%; width: 100%; text-align: center; letter-spacing: 5px; animation: breathe 2s infinite; font-weight: bold; text-shadow: 0 0 5px #0f0; }
        
        @keyframes breathe { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        .flicker { animation: flash-red 0.15s infinite; }
        @keyframes flash-red { 0% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="ui-container">
        <div class="stats">
            <h2 id="status-display">SYSTEM: STANDBY</h2>
            <p id="mode-display">MODE: IDLE</p>
        </div>

        <div id="creator-info">
            <p>PROJECT: WEBNITRIX</p>
            <h2>ARCHITECT: SUDARSHANA MURTHY</h2>
            <p>OS VER: 3.0.4.GOLDEN</p>
            <p>GALVANIC TECHNOLOGY ENGINE</p>
        </div>

        <div id="prompt">INTERACT TO ACTIVATE</div>
        <div id="alien-label">HEATBLAST</div>
        <div id="timer-label">DNA STABILITY: 100%</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let active = false, transformed = false, index = 0;
    let hologram, dial, openSnd, transSnd, beepSnd;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const pL = new THREE.PointLight(0xffffff, 60); pL.position.set(2, 5, 2); scene.add(pL);

    const listener = new THREE.AudioListener(); camera.add(listener);
    const loader = new THREE.AudioLoader();
    openSnd = new THREE.Audio(listener); transSnd = new THREE.Audio(listener); beepSnd = new THREE.Audio(listener);

    loader.load('./static/sounds/opening.mp3', b => openSnd.setBuffer(b));
    loader.load('./static/sounds/transform.mp3', b => transSnd.setBuffer(b));
    loader.load('./static/sounds/timer.mp3', b => beepSnd.setBuffer(b));

    // SOUND: MECHANICAL SCROLL
    function playMechanicalClick() {
    const ctx = listener.context;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    // 1. SINE WAVE: The smoothest sound possible (no sharp edges)
    osc.type = 'sine';

    // 2. SOFT FILTER: Removes the "bullet" sharpness
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, ctx.currentTime);

    // 3. GLIDE: A gentle "bloop" instead of a "crack"
    // Starts at 800Hz (musical) and drops to 400Hz
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);

    // 4. SOFT ENVELOPE: Fades out smoothly
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.1);
}

    // NEW: SYNTHETIC DISCHARGE PULSE
    // This creates that "Emergency Power" warble
    function playDischargeWarning() {
        const ctx = listener.context;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = 'square'; // Sharper, more "electric" sound
        osc.frequency.setValueAtTime(100, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(200, ctx.currentTime + 0.2);
        
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
    }

    const texLoader = new THREE.TextureLoader();
    const aliens = [
        { n: "HEATBLAST", t: texLoader.load('./static/models/alien1.png') },
        { n: "DIAMONDHEAD", t: texLoader.load('./static/models/alien2.png') },
        { n: "XLR8", t: texLoader.load('./static/models/alien6.png') },
        { n: "FOUR ARMS", t: texLoader.load('./static/models/alien3.png') },
        { n: "GREY MATTER", t: texLoader.load('./static/models/alien5.png') }
    ];

    hologram = new THREE.Sprite(new THREE.SpriteMaterial({ map: aliens[0].t, color: 0x00ff00, transparent: true, opacity: 0 }));
    hologram.scale.set(1.6, 1.6, 1); hologram.position.y = 1.8; scene.add(hologram);

    new GLTFLoader().load('./static/models/omnitrix.glb', (g) => {
        scene.add(g.scene);
        g.scene.traverse(n => { if(n.name.toLowerCase().includes("dial")) dial = n; });
        camera.position.set(0, 2, 5); camera.lookAt(0,0,0);
    });

    function updateUI(color, status, mode) {
        const c = "#" + color.toString(16).padStart(6, '0');
        document.getElementById('ui-container').style.color = c;
        document.getElementById('status-display').innerText = `SYSTEM: ${status}`;
        document.getElementById('mode-display').innerText = `MODE: ${mode}`;
        hologram.material.color.setHex(color);
        document.getElementById('creator-info').style.color = c;
        document.getElementById('creator-info').style.borderColor = c;
    }

    window.addEventListener('click', () => {
        if (transformed) return;
        if (!active) {
            active = true;
            if(openSnd.buffer) openSnd.play();
            updateUI(0x00ff00, "ACTIVE", "SELECTION");
            document.getElementById('alien-label').style.opacity = 1;
            document.getElementById('prompt').style.display = "none";
            hologram.material.opacity = 0.8;
        } else {
            transformed = true;
            const flash = document.getElementById('flash');
            flash.style.opacity = 1;
            if(transSnd.buffer) transSnd.play();
            setTimeout(() => { flash.style.opacity = 0; startTimer(); }, 150);
        }
    });

    window.addEventListener('wheel', () => {
        if (active && !transformed) {
            playMechanicalClick();
            index = (index + 1) % aliens.length;
            hologram.material.map = aliens[index].t;
            document.getElementById('alien-label').innerText = aliens[index].n;
            if(dial) dial.rotation.y += 0.4;
        }
    });

    function startTimer() {
        let time = 10;
        document.getElementById('timer-label').style.opacity = 1;
        updateUI(0x00ff00, "ACTIVE", "TRANSFORMED");

        const count = setInterval(() => {
            time--;
            document.getElementById('timer-label').innerText = `DNA STABILITY: ${time * 10}%`;

            if (time === 5) updateUI(0xffff00, "WARNING", "LOW POWER");
            
            if (time <= 3 && time > 0) {
                updateUI(0xff0000, "CRITICAL", "DISCHARGING");
                document.getElementById('ui-container').classList.add('flicker');
                
                // Play the built-in timer sound
                if(beepSnd.buffer && !beepSnd.isPlaying) beepSnd.play();
                // Layer it with the synthetic mechanical discharge pulse
                playDischargeWarning();
            }

            if (time <= 0) { 
                clearInterval(count); 
                updateUI(0xff0000, "SHUTDOWN", "RECHARGING");
                setTimeout(() => location.reload(), 1200); 
            }
        }, 1000);
    }

    function animate() {
        requestAnimationFrame(animate);
        if(active && !transformed) hologram.position.y = 1.8 + Math.sin(Date.now()*0.003)*0.05;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
